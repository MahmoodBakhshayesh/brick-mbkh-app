name: {{project_name}}
description: A new Flutter project.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter



  cupertino_icons: ^1.0.8
  flutter_vector_icons: ^2.0.0
  #  font_awesome_flutter: ^11.0.0
  hooks_riverpod: ^3.2.1
  flutter_hooks:
  go_router: ^17.1.0
  get_it: ^9.2.0
  dio: ^5.9.1
  shared_preferences: ^2.2.0
  flutter_spinkit: ^5.2.2
  auto_size_text: ^3.0.0
  toastification: ^3.0.3
  logger: ^2.6.2
  app_device_net_info: ^0.0.6
  sembast: ^3.8.6
  sembast_web: ^2.4.4+1
  path_provider: ^2.1.5
  typed_data: ^1.4.0
  fast_cached_network_image: ^1.3.3+5
  pinput: ^6.0.2
  http_parser: ^4.1.2
  pin_code_fields: ^9.3.0
  encrypt: ^5.0.3
  crypto: ^3.0.5
  cryptography: ^2.7.0
  smart_auth: ^2.0.0
  permission_handler: ^12.0.1
  share_plus: ^10.0.2
  sms_autofill: ^2.4.1
  app_links: ^6.3.0
  custom_refresh_indicator: ^4.0.1
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  flutter_image_compress: ^2.3.0
  extended_image: ^8.3.0
  flutter_animate_on_scroll: ^0.1.1
  flutter_localization: ^0.2.1
  animated_toggle_switch: ^0.8.7
  radar_chart: ^2.1.0
  numberpicker: ^2.1.2
  lottie: ^3.3.3
  circular_countdown_timer: ^0.2.4
  otp_autofill: ^4.1.0
  readsms: ^0.2.0+4
  flutter_rating_stars: ^1.1.0
  avatar_stack: ^3.0.0
  input_quantity: ^2.6.0
  fluent_ui: ^4.15.1
  flutter_carousel_widget: ^3.1.0
  flutter_slider_drawer: ^3.0.2
  action_slider: ^0.7.0
  sleek_circular_slider: ^2.1.0
  intro_slider: ^4.2.5
  slide_countdown: ^2.0.2
  stop_watch_timer: ^3.2.2
  riverpod_sqflite: ^0.4.2
  unified_fields: ^0.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/data/
    - assets/sounds/
    - assets/fonts/
  fonts:
    - family: Kookfa
      fonts:
        - asset: assets/fonts/kookfa/KookFaNum-Regular.ttf
        - asset: assets/fonts/kookfa/KookFaNum-ExtraLight.ttf
          weight: 100
        - asset: assets/fonts/kookfa/KookFaNum-Light.ttf
          weight: 200
        - asset: assets/fonts/kookfa/KookFaNum-Medium.ttf
          weight: 400
        - asset: assets/fonts/kookfa/KookFaNum-Bold.ttf
          weight: 700
        - asset: assets/fonts/kookfa/KookFaNum-ExtraBold.ttf
          weight: 800

